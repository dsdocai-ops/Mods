<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Thanks for your purchase</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #0b0d12; color: #e8e8ee; max-width: 560px; margin: 80px auto; padding: 0 24px; }
      code { background: #1a1d27; padding: 10px 14px; border-radius: 6px; display: block; font-size: 15px; word-break: break-all; margin: 16px 0; }
      .hint { color: #9a9aa8; font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>Thanks!</h1>
    <p>Paste this into Omega Client's Settings &rarr; Cosmetics &rarr; License key, then hit Redeem:</p>
    <code id="session-id">(loading...)</code>
    <p class="hint">
      This page is only reachable because your Stripe Payment Link's "after payment" redirect points
      here with <code>?session_id={CHECKOUT_SESSION_ID}</code> appended - see this folder's README.
    </p>
    <script>
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      document.getElementById("session-id").textContent = sessionId || "No session_id found in the URL - check your Payment Link's redirect configuration.";
    </script>
  </body>
</html>
