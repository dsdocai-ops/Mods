# Builds the two shippable artifacts this repo produces:
#   - the Omega Client launcher as a Windows portable .exe + NSIS installer (electron-builder)
#   - the companion mod jars for Fabric and Forge (Gradle)
# The two jobs are independent on purpose - the mod compiling against real Minecraft classes for
# the first time is expected to need iteration, and that must never block the launcher artifact.
name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, "claude/**"]

# Queues overlapping runs on the same branch instead of letting them run in parallel - the release
# job's asset-purge-then-upload sequence against one shared "latest-build" GitHub Release isn't
# safe under two concurrent runs (one run's purge step could delete an asset the other just
# uploaded). cancel-in-progress stays false: killing a run mid-purge would be worse than queuing.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Lunar-style: the launcher ships with the Omega mod jars inside it (electron-builder
  # extraResources), so packaging depends on the mod build and stages its artifact first.
  #
  # `if: !cancelled()` is what actually delivers the "independent on purpose" guarantee from the
  # comment below: needs: mod-jars alone only controls ordering, but GitHub Actions' default `if`
  # for a needs-gated job is success() - so a mod-jars *job* failure (e.g. only the Fabric step
  # failing, an outcome the comment explicitly calls "expected to need iteration") would silently
  # skip this job and never build the launcher at all, exactly the thing the comment says must
  # never happen. Safe because the "Stage bundled mod jars" step below already handles a partial
  # mod-jars artifact (find/cp on whatever jars did build, even zero of them).
  launcher-windows:
    needs: mod-jars
    if: ${{ !cancelled() }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: omega-client-mod-jars
          path: staged-mods
      - name: Stage bundled mod jars
        shell: bash
        run: |
          mkdir -p bundled
          find staged-mods -name '*.jar' ! -name '*-sources*' -exec cp {} bundled/ \;
          ls -la bundled
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Stamp build version
        # The auto-updater compares semver: the rolling release always carries 0.1.<run number>,
        # so every CI build is "newer" than any installed one. package.json's committed version
        # stays 0.1.0 - this stamp exists only inside the packaged exe + latest.yml.
        shell: bash
        run: npm version "0.1.${{ github.run_number }}" --no-git-tag-version
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: omega-client-windows
          # latest.yml + .blockmap are what installed launchers poll for auto-updates.
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  mod-jars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"
      - name: Build Fabric jar
        working-directory: mod
        run: gradle :fabric:build --no-daemon --stacktrace
      - name: Build Forge jar
        # if: always() so a Fabric compile failure still exercises the Forge build - they fail (and
        # get fixed) independently.
        if: always()
        working-directory: mod
        run: gradle :forge:build --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: omega-client-mod-jars
          path: |
            mod/fabric/build/libs/*.jar
            mod/forge/build/libs/*.jar
          if-no-files-found: warn

  # Runs the compiled install engine against Mojang's real endpoints (manifest, client jar,
  # libraries; asset objects skipped for time) - the only environment where that network path can
  # actually execute, since the dev sandbox blocks these hosts.
  installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Neither build:renderer (Vite/esbuild) nor build:electron (only covers src/main + shared)
      # type-checks src/renderer - without this, a type error there ships in a packaged build and
      # nothing catches it until a user hits the broken UI at runtime. This job already does the
      # npm ci this needs, so it rides along here instead of a whole extra job.
      - run: npm run typecheck
      - run: npm run build:electron
      - run: node scripts/install-smoke.cjs

  # Publishes everything to a rolling "latest-build" GitHub Release - the repo's Releases page
  # shows plain download links, unlike run artifacts which GitHub's mobile app/site often hides.
  #
  # The explicit if: checks launcher-windows/installer-smoke directly instead of leaving the
  # default success()-of-all-needs gating in place - that default would also require mod-jars to
  # succeed, which reintroduces the same "Fabric-only failure blocks everything" problem
  # launcher-windows's own if: above exists to avoid. mod-jars is deliberately not in this
  # condition: whatever mod jars did build still get published alongside the launcher exe.
  release:
    needs: [launcher-windows, mod-jars, installer-smoke]
    if: ${{ needs.launcher-windows.result == 'success' && needs.installer-smoke.result == 'success' && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Create/update latest-build release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Rolling release updated by CI on every successful build. Launcher: OmegaClient-Portable.exe (just run it) or OmegaClient-Setup.exe (installer, auto-updates itself from here). Mod: the -fabric / -forge jars (skip -sources). latest.yml/.blockmap are auto-update metadata - ignore them."
          gh release create latest-build --repo "$GITHUB_REPOSITORY" \
            --title "Omega Client - latest CI build" \
            --notes "$NOTES" \
            --prerelease || true
          # `gh release create` only sets the notes the first time; keep them current on reruns.
          gh release edit latest-build --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
          # --clobber only replaces same-name assets - when a build renames its artifacts, the old
          # names would linger on the release page forever. Purge anything this build didn't produce.
          for asset in $(gh release view latest-build --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name'); do
            if [ -z "$(find dist -type f -name "$asset" -print -quit)" ]; then
              gh release delete-asset latest-build "$asset" --repo "$GITHUB_REPOSITORY" --yes
            fi
          done
          mapfile -t files < <(find dist -type f \( -name '*.exe' -o -name '*.jar' -o -name '*.yml' -o -name '*.blockmap' \))
          gh release upload latest-build --repo "$GITHUB_REPOSITORY" --clobber "${files[@]}"
