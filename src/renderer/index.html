<!-- "I am the Alpha and the Omega, the first and the last, the beginning and the end" (Revelation 22:13). -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- img-src also allows Modrinth's CDN so the in-launcher mod browser can show project icons.
         Modrinth API *calls* happen in the main process (see src/main/modrinth.ts), so no connect-src
         opening is needed - the renderer only ever loads images from that host. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data:; script-src 'self'; img-src 'self' data: https://cdn.modrinth.com"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omega Client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
